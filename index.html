<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WikiLinks — Wikipedia'da Bağlantı Oyunu</title>
  <meta name="description" content="Wikipedia makaleleri arasında en az tıklamayla hedefe ulaş. iOS için ücretsiz.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      background: linear-gradient(160deg, #080E1E 0%, #0D1630 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #E8EEFF;
      padding: 40px 24px;
    }

    /* Subtle radial glow */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(ellipse 60% 40% at 50% 20%, rgba(42,94,204,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      max-width: 480px;
      width: 100%;
      text-align: center;
      position: relative;
    }

    /* App icon */
    .icon {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      display: block;
      margin: 0 auto 24px;
      box-shadow: 0 8px 32px rgba(26,66,160,0.45);
    }

    h1 {
      font-size: 36px;
      font-weight: 700;
      color: #E8EEFF;
      letter-spacing: 0.3px;
      margin-bottom: 12px;
    }

    .tagline {
      font-size: 17px;
      color: #5A7BAA;
      line-height: 1.6;
      margin-bottom: 40px;
    }

    /* Download button */
    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #1A42A0;
      color: #fff;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 16px;
      font-size: 17px;
      font-weight: 600;
      box-shadow: 0 4px 24px rgba(26,66,160,0.45);
      transition: opacity 0.15s, transform 0.15s;
      margin-bottom: 16px;
      width: 100%;
      justify-content: center;
    }

    .download-btn:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    .download-btn:active {
      transform: translateY(0);
      opacity: 0.75;
    }

    .apple-icon {
      font-size: 22px;
      line-height: 1;
    }

    .free-badge {
      font-size: 12px;
      color: #4A8FE3;
      opacity: 0.8;
      margin-bottom: 40px;
    }

    /* Features */
    .features {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }

    .feature {
      background: rgba(74,143,227,0.08);
      border: 1px solid rgba(74,143,227,0.15);
      border-radius: 12px;
      padding: 8px 14px;
      font-size: 13px;
      color: #7AAEE8;
    }

    footer {
      font-size: 12px;
      color: #2A3D5E;
      line-height: 1.8;
    }

    footer a {
      color: #3A5A8A;
      text-decoration: none;
    }

    footer a:hover {
      color: #5A7BAA;
    }
  </style>
</head>
<body>
  <div class="container">

    <img src="icon.png" alt="WikiLinks" class="icon">

    <h1>WikiLinks</h1>
    <p class="tagline">
      Bir Wikipedia makalesinden diğerine<br>
      en az tıklamayla ulaşabilir misin?
    </p>

    <a href="https://apps.apple.com/app/id6744642295" class="download-btn">
      <span class="apple-icon">&#xf8ff;</span>
      App Store'dan İndir
    </a>
    <p class="free-badge">Ücretsiz · iOS için</p>

    <div class="features">
      <span class="feature">Günlük Challenge</span>
      <span class="feature">Arkadaşla Oyna</span>
      <span class="feature">Türkçe &amp; İngilizce</span>
    </div>

    <footer>
      <a href="https://apps.apple.com/app/id6744642295">App Store</a>
      &nbsp;·&nbsp;
      <a href="mailto:support@bilakis.com">Destek</a>
    </footer>

  </div>
</body>
</html>
