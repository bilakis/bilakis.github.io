<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WikiLinks Challenge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: linear-gradient(160deg, #0A1228 0%, #0F1A40 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #E8EEFF;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(28,53,200,0.25);
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .logo {
      width: 72px; height: 72px;
      border-radius: 18px;
      margin: 0 auto 20px;
      overflow: hidden;
    }
    .logo img { width: 100%; height: 100%; object-fit: cover; }
    .app-name { font-size: 22px; font-weight: 700; color: #E8EEFF; margin-bottom: 4px; }
    .badge {
      display: inline-block;
      background: rgba(28,53,200,0.2);
      color: #A8BFFF;
      font-size: 11px; font-weight: 600;
      letter-spacing: 2px;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 28px;
    }
    .route {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 28px;
    }
    .pill {
      display: inline-block;
      padding: 8px 18px;
      border-radius: 12px;
      font-size: 15px; font-weight: 600;
      word-break: break-word;
    }
    .pill-start  { background: rgba(28,53,200,0.5); color: #C8DFFF; border: 1px solid rgba(28,53,200,0.6); }
    .pill-target { background: rgba(91,26,26,0.7);  color: #FFCFCF; border: 1px solid rgba(204,58,58,0.5); }
    .arrow { color: #5C7EEE; font-size: 22px; margin: 10px 0; display: block; }
    .open-btn {
      display: block; width: 100%;
      background: #1C35C8;
      color: #fff;
      font-size: 17px; font-weight: 600;
      padding: 16px;
      border: none; border-radius: 16px;
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 12px;
      box-shadow: 0 4px 20px rgba(28,53,200,0.45);
    }
    .store-link {
      color: #5A7BAA;
      font-size: 14px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="icon.png" alt="WikiLinks">
    </div>
    <div class="app-name">WikiLinks</div>
    <div class="badge">CHALLENGE</div>

    <div class="route">
      <span class="pill pill-start" id="startTitle">▶ …</span>
      <span class="arrow">↓</span>
      <span class="pill pill-target" id="targetTitle">◎ …</span>
    </div>

    <a class="open-btn" id="openBtn" href="#">Uygulamada Aç →</a>
    <a href="https://apps.apple.com/app/id6744642295" class="store-link">
      WikiLinks'i indir
    </a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id     = params.get('id')     || '';
    const start  = params.get('start')  || '?';
    const target = params.get('target') || '?';

    document.getElementById('startTitle').textContent  = '▶ ' + start;
    document.getElementById('targetTitle').textContent = '◎ ' + target;
    document.title = start + ' → ' + target + ' — WikiLinks';

    const deepLink = 'wikilinks://challenge/' + id;
    document.getElementById('openBtn').href = deepLink;

    if (id) {
      window.location.href = deepLink;
    }
  </script>
</body>
</html>
